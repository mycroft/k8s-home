apiVersion: v1
kind: Namespace
metadata:
  name: garage
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cors-headers
  namespace: garage
spec:
  headers:
    accessControlAllowHeaders:
      - "*"
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    accessControlAllowOriginList:
      - "*"
    accessControlMaxAge: 100
    addVaryHeader: true
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: garage
  namespace: flux-system
spec:
  interval: 1m0s
  url: https://charts.derwitt.dev/
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-helm-val-garage-c86fe7af
  namespace: garage
data:
  values.yaml: |
    garage:
      # Use only 2 replicas per object
      replicationFactor: 2

    # Start 4 instances (StatefulSets) of garage
    deployment:
      replicaCount: 4

    # Override default storage class and size
    persistence:
      meta:
        storageClass: "longhorn-crypto-global"
        size: 100Mi
      data:
        storageClass: "longhorn-crypto-global"
        size: 64Gi

    ingress:
      s3:
        api:
          enabled: true
          className: "traefik"
          annotations:
            cert-manager.io/cluster-issuer: "letsencrypt-prod"
            traefik.ingress.kubernetes.io/router.middlewares: garage-cors-headers@kubernetescrd
          hosts:
            - host: s3-api.iop.cx
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: garage-ingress-cert
              hosts:
                - s3-api.iop.cx
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  annotations:
    configMapHash: 2cbc602e49921991088124b66abc16485d6f7fd0ebfcc32effe5c4805f8c3118
  name: garage
  namespace: garage
spec:
  chart:
    spec:
      chart: garage
      sourceRef:
        kind: HelmRepository
        name: garage
        namespace: flux-system
      version: 2.3.2
  install:
    createNamespace: false
    skipCRDs: false
  interval: 10m0s
  timeout: 5m0s
  values: {}
  valuesFrom:
    - kind: ConfigMap
      name: garage-helm-val-garage-c86fe7af
      valuesKey: values.yaml
