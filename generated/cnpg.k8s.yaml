apiVersion: v1
kind: Namespace
metadata:
  name: cnpg
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: cnpg
spec:
  bootstrap:
    initdb:
      database: postgres
      owner: postgres
  enableSuperuserAccess: true
  instances: 2
  managed:
    roles:
      - createdb: false
        createrole: false
        disablePassword: false
        ensure: present
        login: true
        name: zipline
        superuser: false
  storage:
    size: 64Gi
    storageClass: longhorn-crypto-global
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: postgres-zipline
  namespace: cnpg
spec:
  cluster:
    name: postgres
  name: zipline
  owner: zipline
