apiVersion: v1
kind: Namespace
metadata:
  name: cnpg
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: cnpg
spec:
  bootstrap:
    initdb:
      database: postgres
      owner: postgres
  enableSuperuserAccess: true
  instances: 2
  storage:
    size: 64Gi
    storageClass: longhorn-crypto-global
