apiVersion: v1
kind: Namespace
metadata:
  name: harbor-scanner-trivy
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: secretstore-vault
  namespace: harbor-scanner-trivy
spec:
  provider:
    vault:
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
      path: secret
      server: http://vault.vault:8200
      version: v2
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-scanner-trivy-es-basic-auth-users-c86ea45a
  namespace: harbor-scanner-trivy
spec:
  dataFrom:
    - extract:
        conversionStrategy: Default
        key: secret/namespaces/harbor-scanner-trivy/basic-auth-users
  refreshInterval: 15m
  secretStoreRef:
    kind: SecretStore
    name: secretstore-vault
  target:
    creationPolicy: Owner
    deletionPolicy: Delete
    immutable: false
    name: basic-auth-users
    template:
      engineVersion: v2
      type: Opaque
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: aqua
  namespace: flux-system
spec:
  interval: 1m0s
  url: https://helm.aquasec.com
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: redis
  name: harbor-scanner-trivy-redis-svc-c8371f05
  namespace: harbor-scanner-trivy
spec:
  ports:
    - name: http
      port: 6379
  selector:
    app.kubernetes.io/component: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: harbor-scanner-trivy-redis-sts-c8cccac0
  namespace: harbor-scanner-trivy
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: redis
  serviceName: harbor-scanner-trivy-redis-svc-c8371f05
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis
    spec:
      containers:
        - command:
            - redis-server
            - --save
            - "60"
            - "1"
            - --loglevel
            - warning
          env: []
          image: redis:8.8.0
          name: redis
          volumeMounts:
            - mountPath: /data
              name: data
      securityContext:
        fsGroup: 0
      volumes: []
  volumeClaimTemplates:
    - metadata:
        labels:
          app.kubernetes.io/component: redis
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
        storageClassName: longhorn-crypto-global
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: harbor-scanner-trivy-helm-val-harbor-scanner-trivy-c8369a47
  namespace: harbor-scanner-trivy
data:
  values.yaml: |
    # https://github.com/goharbor/harbor-scanner-trivy/blob/main/helm/harbor-scanner-trivy/values.yaml

    scanner:
      redis:
        poolURL: "redis://harbor-scanner-trivy-redis-svc-c8371f05:6379"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  annotations:
    configMapHash: 8b161f727c30e142149e2b5da4049a8e45185fb448dce5a8f475a2e0f1379488
  name: harbor-scanner-trivy
  namespace: harbor-scanner-trivy
spec:
  chart:
    spec:
      chart: harbor-scanner-trivy
      sourceRef:
        kind: HelmRepository
        name: aqua
        namespace: flux-system
      version: 0.17.0
  install:
    createNamespace: false
    skipCRDs: false
  interval: 10m0s
  timeout: 5m0s
  values: {}
  valuesFrom:
    - kind: ConfigMap
      name: harbor-scanner-trivy-helm-val-harbor-scanner-trivy-c8369a47
      valuesKey: values.yaml
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: basic-auth
  namespace: harbor-scanner-trivy
spec:
  basicAuth:
    realm: Trivy Scanner Authentication
    secret: basic-auth-users
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: harbor-scanner-trivy-basic-auth@kubernetescrd
  name: harbor-scanner-trivy-ingress-c88a2dd7
  namespace: harbor-scanner-trivy
spec:
  ingressClassName: traefik
  rules:
    - host: trivy-scanner.services.mkz.me
      http:
        paths:
          - backend:
              service:
                name: harbor-scanner-trivy
                port:
                  name: api-server
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - trivy-scanner.services.mkz.me
      secretName: secret-tls-www
