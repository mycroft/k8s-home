apiVersion: v1
kind: Namespace
metadata:
  name: music-assistant
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: music-assistant-music-assistant-cert-c807807d
  namespace: music-assistant
spec:
  dnsNames:
    - music-assistant.iop.cx
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
  secretName: music-assistant-redirect-tls
---
apiVersion: v1
kind: Service
metadata:
  name: music-assistant-external-api-c8e4d0ca
  namespace: music-assistant
spec:
  externalName: 10.0.0.7
  ports:
    - name: http
      port: 8095
      targetPort: 8095
  type: ExternalName
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: music-assistant-music-assistant-ingress-c8afe700
  namespace: music-assistant
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`music-assistant.iop.cx`)
      services:
        - name: music-assistant-external-api-c8e4d0ca
          port: http
  tls:
    secretName: music-assistant-redirect-tls
