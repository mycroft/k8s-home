apiVersion: v1
kind: Namespace
metadata:
  name: temporal
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: secretstore-vault
  namespace: temporal
spec:
  provider:
    vault:
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
      path: secret
      server: http://vault.vault:8200
      version: v2
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: temporal-es-postgresql2-c86e0251
  namespace: temporal
spec:
  dataFrom:
    - extract:
        conversionStrategy: Default
        key: secret/namespaces/temporal/postgresql2
  refreshInterval: 15m
  secretStoreRef:
    kind: SecretStore
    name: secretstore-vault
  target:
    creationPolicy: Owner
    deletionPolicy: Delete
    immutable: false
    name: postgresql2
    template:
      engineVersion: v2
      type: Opaque
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: temporal-es-postgresql-visibility2-c8980449
  namespace: temporal
spec:
  dataFrom:
    - extract:
        conversionStrategy: Default
        key: secret/namespaces/temporal/postgresql-visibility2
  refreshInterval: 15m
  secretStoreRef:
    kind: SecretStore
    name: secretstore-vault
  target:
    creationPolicy: Owner
    deletionPolicy: Delete
    immutable: false
    name: postgresql-visibility2
    template:
      engineVersion: v2
      type: Opaque
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: temporal
  namespace: flux-system
spec:
  interval: 1m0s
  url: https://go.temporal.io/helm-charts
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: temporal-helm-val-temporal-c860c230
  namespace: temporal
data:
  values.yaml: |+
    # https://github.com/temporalio/helm-charts/blob/master/charts/temporal/values.yaml

    server:
      config:
        persistence:
          datastores:
            default:
              driver: "sql"
              sql:
                pluginName: "postgres12"
                connectAddr: "postgres-instance.postgres:5432"
                connectProtocol: tcp
                user: temporal2
                databaseName: temporal2
                maxConns: 20
                maxConnLifetime: "1h"
                existingSecret: postgresql2
                createDatabase: false
                manageSchema: false
            visibility:
              driver: "sql"
              sql:
                pluginName: "postgres12"
                connectAddr: "postgres-instance.postgres:5432"
                connectProtocol: tcp
                user: temporal_visibility2
                databaseName: temporal_visibility2
                maxConns: 20
                maxConnLifetime: "1h"
                existingSecret: postgresql-visibility2
                createDatabase: false
                manageSchema: false

    web:
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          traefik.ingress.kubernetes.io/redirect-entry-point: https
          traefik.ingress.kubernetes.io/redirect-permanent: "true"
          traefik.ingress.kubernetes.io/router.middlewares: traefik-forward-auth-traefik-forward-auth@kubernetescrd
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - temporal.services.mkz.me
        tls:
          - secretName: temporal-tls
            hosts:
              - temporal.services.mkz.me


---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  annotations:
    configMapHash: 552bcbe55af445fc4e136726246246a3b560ecbf392cab354347883ec9585712
  name: temporal
  namespace: temporal
spec:
  chart:
    spec:
      chart: temporal
      sourceRef:
        kind: HelmRepository
        name: temporal
        namespace: flux-system
      version: 1.0.0
  install:
    createNamespace: false
    skipCRDs: false
  interval: 10m0s
  timeout: 5m0s
  values: {}
  valuesFrom:
    - kind: ConfigMap
      name: temporal-helm-val-temporal-c860c230
      valuesKey: values.yaml
