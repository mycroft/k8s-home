apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: traefik-traefik-dashboard-cert-c87bf99f
  namespace: kube-system
spec:
  dnsNames:
    - traefik.services.mkz.me
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
  secretName: secret-tls-www
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: kube-system
spec:
  routes:
    - kind: Rule
      match: Host(`traefik.services.mkz.me`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))
      middlewares:
        - name: traefik-forward-auth-traefik-forward-auth@kubernetescrd
      services:
        - kind: TraefikService
          name: api@internal
