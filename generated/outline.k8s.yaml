apiVersion: v1
kind: Namespace
metadata:
  name: outline
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: secretstore-vault
  namespace: outline
spec:
  provider:
    vault:
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
      path: secret
      server: http://vault.vault:8200
      version: v2
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: outline-es-postgres-c89cd9b5
  namespace: outline
spec:
  dataFrom:
    - extract:
        conversionStrategy: Default
        key: secret/namespaces/outline/postgres
  refreshInterval: 15m
  secretStoreRef:
    kind: SecretStore
    name: secretstore-vault
  target:
    creationPolicy: Owner
    deletionPolicy: Delete
    immutable: false
    name: postgres
    template:
      engineVersion: v2
      type: Opaque
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: outline-es-secret-c859b5a3
  namespace: outline
spec:
  dataFrom:
    - extract:
        conversionStrategy: Default
        key: secret/namespaces/outline/secret
  refreshInterval: 15m
  secretStoreRef:
    kind: SecretStore
    name: secretstore-vault
  target:
    creationPolicy: Owner
    deletionPolicy: Delete
    immutable: false
    name: secret
    template:
      engineVersion: v2
      type: Opaque
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: outline-es-oidc-c8558937
  namespace: outline
spec:
  dataFrom:
    - extract:
        conversionStrategy: Default
        key: secret/namespaces/outline/oidc
  refreshInterval: 15m
  secretStoreRef:
    kind: SecretStore
    name: secretstore-vault
  target:
    creationPolicy: Owner
    deletionPolicy: Delete
    immutable: false
    name: oidc
    template:
      engineVersion: v2
      type: Opaque
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: outline-es-garage-c8f086be
  namespace: outline
spec:
  dataFrom:
    - extract:
        conversionStrategy: Default
        key: secret/namespaces/outline/garage
  refreshInterval: 15m
  secretStoreRef:
    kind: SecretStore
    name: secretstore-vault
  target:
    creationPolicy: Owner
    deletionPolicy: Delete
    immutable: false
    name: garage
    template:
      engineVersion: v2
